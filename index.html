<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Progress Reports</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Segoe UI", system-ui, sans-serif;
  background: #0f1117;
  color: #e2e8f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
  padding: 40px 24px;
}
.badge {
  background: #3b82f6;
  color: white;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
  letter-spacing: 1px;
  text-transform: uppercase;
}
h1 {
  font-size: 28px;
  font-weight: 700;
  color: #f1f5f9;
  text-align: center;
}
p {
  color: #64748b;
  font-size: 14px;
  text-align: center;
}
.cards {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}
.card {
  background: #1e2530;
  border: 1px solid #2d3748;
  border-radius: 16px;
  padding: 32px 40px;
  width: 260px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  text-decoration: none;
  color: inherit;
  transition: border-color 0.15s, transform 0.1s;
  cursor: pointer;
}
.card:hover {
  border-color: #3b82f6;
  transform: translateY(-2px);
}
.card-icon {
  font-size: 40px;
}
.card-title {
  font-size: 18px;
  font-weight: 700;
  color: #f1f5f9;
  text-align: center;
}
.card-desc {
  font-size: 13px;
  color: #64748b;
  text-align: center;
}
.card-btn {
  background: #3b82f6;
  color: white;
  border: none;
  border-radius: 8px;
  padding: 10px 24px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
  margin-top: 8px;
}
.card:hover .card-btn {
  background: #2563eb;
}
.footer {
  color: #374151;
  font-size: 12px;
}
</style>
</head>
<body>
  <span class="badge">QA Progress</span>
  <div style="text-align:center">
    <h1>Testing Progress Reports</h1>
    <p style="margin-top:8px">Auto-updated every 15 minutes</p>
  </div>
  <div class="cards">
    <a class="card" href="wa.html" target="_blank">
      <div class="card-icon">📱</div>
      <div class="card-title">WA Feature</div>
      <div class="card-desc">Username, BSUID & CDP Integration</div>
      <div class="card-btn">Open Report →</div>
    </a>
    <a class="card" href="wac.html" target="_blank">
      <div class="card-icon">☁️</div>
      <div class="card-title">WAC Feature</div>
      <div class="card-desc">WhatsApp Cloud Integration</div>
      <div class="card-btn">Open Report →</div>
    </a>
  </div>
  <div class="footer">Qiscus QA Team · Updates every 15 min</div>
</body>
</html>
